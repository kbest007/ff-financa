<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - FF Finanças</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">
      Redefinir Senha
    </h1>

    <input
      type="password"
      id="newPassword"
      placeholder="Digite sua nova senha"
      class="w-full border rounded-lg px-4 py-3 mb-4"
    >

    <button
      onclick="updatePassword()"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg"
    >
      Salvar Nova Senha
    </button>
  </div>

  <script>
    const { createClient } = supabase;

    const supabaseClient = createClient(
      'https://bnckbipxefthevbnxfwl.supabase.co',
      'sb_publishable_h5L0c38xpwtpdnpz1BNORQ_g7pcvXqC'
    );

    async function updatePassword() {
      const password =
        document.getElementById('newPassword').value;

      if (!password) {
        alert('Digite uma nova senha.');
        return;
      }

      const { error } =
        await supabaseClient.auth.updateUser({
          password: password
        });

      if (error) {
        alert('Erro: ' + error.message);
        console.error(error);
        return;
      }

      alert('Senha alterada com sucesso!');
      window.location.href = 'https://ff-financa.vercel.app/';
    }
  </script>

</body>
</html>
